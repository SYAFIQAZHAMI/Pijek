name: Build PIJEK iOS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: |
          cd pijek_mobile
          flutter pub get

      - name: Build iOS (No Codesign)
        run: |
          cd pijek_mobile
          flutter build ios --no-codesign

      - name: Compress iOS App Bundle
        run: |
          cd pijek_mobile/build/ios/iphoneos
          zip -r PIJEK_iOS.zip Runner.app

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pijek-ios-build
          path: pijek_mobile/build/ios/iphoneos/PIJEK_iOS.zip
